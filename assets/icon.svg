<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="figureGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg3)"/>

  <!-- Shield shape -->
  <path d="M256 72 L410 138 C410 138 420 310 256 438 C92 310 102 138 102 138 Z"
        fill="url(#shieldFill)" stroke="white" stroke-width="4" opacity="0.9"/>

  <!-- Inner shield line -->
  <path d="M256 104 L386 160 C386 160 394 306 256 412 C118 306 126 160 126 160 Z"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>

  <!-- Third eye / oracle eye at top of shield -->
  <ellipse cx="256" cy="178" rx="42" ry="22" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
  <circle cx="256" cy="178" r="11" fill="white" opacity="0.85"/>
  <circle cx="256" cy="178" r="5" fill="#1E1B4B"/>

  <!-- Accessibility figure below the eye -->
  <!-- Head -->
  <circle cx="256" cy="238" r="16" fill="url(#figureGrad)"/>

  <!-- Body -->
  <line x1="256" y1="254" x2="256" y2="310" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Arms - open -->
  <line x1="218" y1="278" x2="256" y2="272" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="294" y1="278" x2="256" y2="272" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="256" y1="310" x2="230" y2="365" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="310" x2="282" y2="365" stroke="white" stroke-width="7" stroke-linecap="round"/>
</svg>
